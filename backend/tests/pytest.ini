# ===============================================
# 43V3R CORE - Pytest Configuration
# ===============================================
# Production-grade test infrastructure configuration

[tool:pytest]
minversion = 8.0
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --strict-markers
    --tb=short
    --asyncio-mode=auto
    --cov=app
    --cov-report=term-missing
    --cov-report=html:coverage/html
    --cov-fail-under=80
    --mypy=app
    -p no:warnings
markers =
    # Test categories
    unit: Unit tests for individual components
    integration: Integration tests for service interactions
    e2e: End-to-end tests for full workflows
    chaos: Chaos engineering tests for resilience
    simulation: Distributed simulation tests
    performance: Performance and load tests
    
    # Domain-specific markers
    runtime: Runtime orchestration tests
    semantic: Semantic analysis tests
    governance: Governance system tests
    websocket: WebSocket communication tests
    observability: Observability and telemetry tests
    distributed: Distributed system tests
    cognitive: Cognitive processing tests
    
    # Test characteristics
    slow: Tests that take significant time
    flaky: Tests with known intermittent behavior
    database: Tests requiring database access
    redis: Tests requiring Redis
    external: Tests requiring external services
    
    # Test priorities
    critical: Critical path tests
    regression: Regression test suite
    smoke: Quick smoke tests

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
