# ===============================================
# Docker Compose Configuration
# ===============================================
services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: versemusic-db
    environment:
      POSTGRES_DB: versemusic
      POSTGRES_USER: versemusic
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U versemusic"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - versemusic-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: versemusic-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - versemusic-network

  # Backend API
  backend:
    build:
      context: ../../
      dockerfile: infrastructure/docker/backend.Dockerfile
    container_name: versemusic-backend
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=versemusic
      - POSTGRES_USER=versemusic
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-secret-key}
      - APP_ENV=development
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media_storage:/app/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - versemusic-network

  # Celery Worker
  worker:
    build:
      context: ../../
      dockerfile: infrastructure/docker/worker.Dockerfile
    container_name: versemusic-worker
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=versemusic
      - POSTGRES_USER=versemusic
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media_storage:/app/storage
    networks:
      - versemusic-network
    profiles:
      - worker

  # Frontend (Development)
  frontend:
    build:
      context: ../../
      dockerfile: infrastructure/docker/frontend.Dockerfile
      target: development
    container_name: versemusic-frontend
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ../../frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - versemusic-network

# Volumes
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  media_storage:
    driver: local

# Networks
networks:
  versemusic-network:
    driver: bridge